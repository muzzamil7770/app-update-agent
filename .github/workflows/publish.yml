name: Publish to npm & GitHub Packages

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Auto bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore: bump version to %s [skip ci]"
          git push origin main --follow-tags

      - name: Build
        run: npm run build

      # ── Publish to npmjs.org ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish to GitHub Packages ────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NOTES="Published @muzzamil7770/app-update-agent@${VERSION} to npm & GitHub Packages.

          Install: npm i @muzzamil7770/app-update-agent
          npm: https://www.npmjs.com/package/@muzzamil7770/app-update-agent"

          gh release create "v${VERSION}" --title "v${VERSION}" --notes "${NOTES}" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
